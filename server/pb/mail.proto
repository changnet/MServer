//聊天模块 协议定义

syntax = "proto3";
package mail;

import "comm.proto";

// 邮件数据
message Mail
{
    // 所有道具通用字段
    double id     = 1; // 邮件id
    string title = 2; // 标题
    string text   = 3; // 内容
    repeated comm.Res atts = 4; // 附件
    // 补充状态等其他字段
}

/* 邮件列表 */
message SMailInfo
{
    repeated Mail mails = 1; // 邮件列表
}

// 删除邮件
message MailDel
{
    repeated double id = 1; // 要删除的邮件id
}

// 新增邮件
message SNewMail
{
    Mail mail = 1; // 邮件列表
}

// 邮件标记已读
message CMailRead
{
    double id = 1; // 已读邮件id
}

// 邮件标记已读返回
message SMailRead
{
    double id = 1; // 已读邮件id
}

// 领取附件
message CMailClaim
{
    double id = 1; // 领取附件的邮件id
}

// 领取附件返回
message SMailClaim
{
    double id = 1; // 已领取的邮件id
    repeated comm.Res atts = 2; // 领取的附件
}

// 一键领取所有附件（客户端请求）
message CMailClaimAll {}

// 一键领取所有附件返回
message SMailClaimAll
{
    repeated double ids = 1; // 已领取附件的邮件id列表
}

// 一键删除所有已读邮件（客户端请求）
message CMailDelRead {}

// 一键删除所有已读邮件返回
message SMailDelRead
{
    repeated double ids = 1; // 已删除的邮件id列表
}
