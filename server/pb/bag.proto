//聊天模块 协议定义

syntax = "proto3";
package bag;

// 道具结构
message Item
{
    // 所有道具通用字段
    string uuid = 1; // 唯一id
    int32 id    = 2; // 道具id
    int32 count = 3; // 数量数量
    int32 grid  = 4; // 所在格子索引
}

/* 背包数据
 * 注：单个道具变动时，也是发此协议。只是数组长度为1.如果count = 0，则表示删除
 */
message SBagInfo
{
    int32 id = 1; // 背包id
    repeated Item items = 1; // 道具列表
}


