//玩家模块 协议定义

syntax = "proto3";
package player;

import "comm.proto";

// 登录
message CLogin
{
    int32 sid      = 1; // 服务器id
    int32 time     = 2; // 时间戳
    int32 pfid     = 3; // 平台id
    string sign    = 4; // 签名
    string account = 5; // 帐户
}

// 登录返回
message SLogin
{
    message Role
    {
        int64 pid = 1; // 角色id
        string name = 2; // 角色名字
    }
    repeated Role list = 1;
    int32 errno = 2; // 错误码
}

// 创建角色
message CCreateRole
{
    string name = 1; // 名字
}

// 创建角色返回
message SCreateRole
{
    int64 pid = 1; // 玩家id
    string name = 2; // 角色名字
    int32 errno = 3; // 错误码
}

// 进入游戏
message CEnterGame
{
    int64 pid = 1; // 玩家id
}

// 踢下线
message SKick
{
    int32 reason = 1; // 原因 1顶号 2管理员踢人
}

// 登录下发玩家基础数据
message SBase
{
    int32 create_time = 1; // 创角游戏时间戳
    int32 server_time = 2; // 服务器当前游戏时间戳
    repeated int64 pp_int = 3; // 所有整形属性，按id从小到大排列
    repeated string pp_str = 4; // 所有整形属性，按id从小到大排列
}

// 玩家进入副本
message CEnterDungeon
{
    int32 id = 1; // 副本id
}

// 虚拟货币更新
message MoneyUpdate
{
    int32 type = 1; // 类型
    int64 num  = 2; // 数量
}

// 虚拟货币初始化
message MoneyInfo
{
    repeated MoneyUpdate list = 1;
}

