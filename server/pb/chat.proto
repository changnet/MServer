//聊天模块 协议定义

syntax = "proto3";
package chat;

// 登录时下发聊天基础数据
message SChatInfo
{
    int32 no_chat = 1; // 禁言
}

// 发送聊天消息
message CChatMsg
{
    int32 channel = 1; // 频道
    string context = 2; // 聊天内容
}

// 收到聊天消息
message SChatMsg
{
    int32 channel = 1; // 频道
    string context = 2; // 聊天内容

    int32 pid= 3; //发起聊天的玩家Id
    string name = 4; // 玩家名字
}

